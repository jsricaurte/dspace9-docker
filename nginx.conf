##############################################################################
# nginx.conf — DSpace 9
# Generado por setup.sh — no editar manualmente
#
# LECCIÓN: proxy_pass al backend DEBE terminar en /server.
#          Sin esa ruta exacta el backend devuelve 404 → nginx convierte en 502.
##############################################################################

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 512M;

    # Redirigir HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend REST API — /server al final es OBLIGATORIO
        location /server {
            proxy_pass          http://dspace:8080/server;
            proxy_read_timeout  300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout  300s;
        }

        # Frontend Angular
        location / {
            proxy_pass         http://dspace-ui:4000;
            proxy_read_timeout 120s;
        }
    }
}
