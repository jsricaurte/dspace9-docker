###############################################################################
# DSpace 9 — Docker Compose PRODUCCIÓN
# Repositorio: https://github.com/jsricaurte/dspace9-docker
#
# Servidor probado: Ubuntu 24.04 LTS · 8 cores · 8 GB RAM
# Versiones:        DSpace 9.3-SNAPSHOT · PostgreSQL 16 · NGINX 1.25
#
# ANTES DE USAR:
#   1. cp .env.example .env && nano .env
#   2. chmod +x setup.sh limpiar.sh
#   3. ./setup.sh
#
# ERRORES CRÍTICOS RESUELTOS (ver ERRORES.md):
#   ✓ Spring Boot muere silenciosamente  → LOGGING_CONFIG obligatorio
#   ✓ Error 500 "Service unavailable"    → ssrBaseUrl en config.yml
#   ✓ Error 502 Bad Gateway permanente   → proxy_pass con /server al final
#   ✓ docker compose down no baja todo   → restart: unless-stopped
#   ✓ Solr falla con "cp: cannot stat"   → entrypoint sin comandos cp
#   ✓ nginx no confía en el proxy        → subnet y proxies.trusted alineados
#   ✓ Angular recompila en cada reinicio → entrypoint con build persistido en volumen
#   ✓ Angular SSR no permite IPs         → NODE_ENV=production node (sin cross-env)
#   ✓ config.json embebe ssl:false       → parche Python post-build en setup.sh
###############################################################################

networks:
  dspacenet:
    driver: bridge
    ipam:
      config:
        # Subnet fija OBLIGATORIA — debe coincidir con proxies.trusted.ipranges
        - subnet: 172.23.0.0/24

volumes:
  pgdata:        # Datos PostgreSQL   ← NUNCA borrar en producción
  solrdata:      # Índices Solr        ← NUNCA borrar en producción
  assetstore:    # Archivos subidos    ← NUNCA borrar en producción
  angular_dist:  # Build Angular SSR   ← persiste entre reinicios (build solo la primera vez)

services:

  # ── 1. POSTGRESQL 16 ───────────────────────────────────────────────────────
  dspacedb:
    image: postgres:16-alpine
    container_name: dspacedb
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-dspace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dspacenet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dspace} -d ${POSTGRES_DB:-dspace}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── 2. APACHE SOLR ─────────────────────────────────────────────────────────
  # Las imágenes de Docker Hub ya incluyen los configsets.
  # NO usar el entrypoint del repo oficial de GitHub — ese es para desarrollo
  # con código fuente local y falla con imágenes precompiladas.
  dspacesolr:
    image: dspace/dspace-solr:dspace-9_x
    container_name: dspacesolr
    user: root
    working_dir: /var/solr/data
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        init-var-solr
        precreate-core authority  /opt/solr/server/solr/configsets/authority
        precreate-core oai        /opt/solr/server/solr/configsets/oai
        precreate-core search     /opt/solr/server/solr/configsets/search
        precreate-core statistics /opt/solr/server/solr/configsets/statistics
        chown -R solr:solr /var/solr
        runuser -u solr -- solr-foreground
    volumes:
      - solrdata:/var/solr/data
    networks:
      - dspacenet
    restart: unless-stopped

  # ── 3. DSPACE BACKEND (REST API) ───────────────────────────────────────────
  # CRÍTICO 1: LOGGING_CONFIG es OBLIGATORIO.
  #   Sin esta variable, Log4j2 entra en bucle recursivo con Spring Boot 3.5.x
  #   y mata el proceso en silencio — solo aparece el banner ASCII en los logs.
  #
  # CRÍTICO 2: proxies.trusted.ipranges DEBE coincidir con la subnet de la red.
  #   Sin esto DSpace no confía en nginx y algunas operaciones fallan.
  dspace:
    image: dspace/dspace:dspace-9_x
    container_name: dspace
    environment:
      dspace__P__dir:            /dspace
      dspace__P__name:           ${DSPACE_NAME:-Repositorio Institucional}
      dspace__P__server__P__url: https://${DSPACE_HOST}/server
      dspace__P__ui__P__url:     https://${DSPACE_HOST}
      db__P__url:       jdbc:postgresql://dspacedb:5432/${POSTGRES_DB:-dspace}
      db__P__username:  ${POSTGRES_USER:-dspace}
      db__P__password:  ${POSTGRES_PASSWORD}
      solr__P__server:  http://dspacesolr:8983/solr
      proxies__P__trusted__P__ipranges: '172.23.0'
      LOGGING_CONFIG: /dspace/config/log4j2-container.xml
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        echo "Esperando PostgreSQL..."
        while ! (echo > /dev/tcp/dspacedb/5432) 2>/dev/null; do sleep 3; done
        echo "PostgreSQL listo."
        echo "Esperando Solr..."
        while ! (echo > /dev/tcp/dspacesolr/8983) 2>/dev/null; do sleep 3; done
        echo "Solr listo. Ejecutando migración de base de datos..."
        /dspace/bin/dspace database migrate
        echo "Migración completa. Iniciando REST API..."
        java -jar /dspace/webapps/server-boot.jar --dspace.dir=/dspace
    volumes:
      - assetstore:/dspace/assetstore
    depends_on:
      dspacedb:
        condition: service_healthy
      dspacesolr:
        condition: service_started
    networks:
      - dspacenet
    expose:
      - "8080"
    restart: unless-stopped

  # ── 4. DSPACE ANGULAR UI (FRONTEND) ────────────────────────────────────────
  # PROBLEMA RESUELTO: La imagen base usa "npm run serve" (modo desarrollo)
  # como entrypoint — recompila Angular en cada reinicio (~25-40 min).
  #
  # SOLUCIÓN: Sobreescribir con entrypoint (NO command).
  #   - "command" se pasa como argumento al entrypoint existente → no lo reemplaza
  #   - "entrypoint" reemplaza completamente el proceso de arranque
  #
  # IMPORTANTE: No usar "cross-env" — no existe en /bin/sh de Linux.
  #   Usar directamente: NODE_ENV=production node /app/dist/server/main
  #
  # El volumen angular_dist persiste el build. Primera vez: ~25-40 min.
  # Reinicios siguientes: ~1-2 min (arranque directo sin recompilar).
  #
  # NOTA: Después de la primera compilación, el setup.sh aplica un parche
  # Python al config.json para corregir ssl:false → ssl:true.
  dspace-ui:
    image: dspace/dspace-angular:dspace-9_x
    container_name: dspace-ui
    entrypoint:
      - /bin/sh
      - '-c'
      - |
        if [ -f /app/dist/server/main.js ]; then
          echo "Build encontrado. Aplicando parche SSL..."
        else
          echo "Primera vez: compilando en modo producción (~25-40 min)..."
          npm run build:ssr
        fi
        python3 -c "
import json, os
f='/app/dist/browser/assets/config.json'
host=os.environ.get('DSPACE_REST_HOST','localhost')
d=json.load(open(f))
d['rest']['ssl']=True
d['rest']['baseUrl']='https://'+host+'/server'
json.dump(d,open(f,'w'))
print('Parche SSL aplicado: ssl=True baseUrl=https://'+host+'/server')
"
        echo "Arrancando servidor Node en modo producción..."
        NODE_ENV=production node /app/dist/server/main
    environment:
      DSPACE_UI_SSL:         'false'
      DSPACE_UI_HOST:        '0.0.0.0'
      DSPACE_UI_PORT:        '4000'
      DSPACE_REST_SSL:       'false'
      DSPACE_REST_HOST:      ${DSPACE_HOST}
      DSPACE_REST_PORT:      '443'
      DSPACE_REST_NAMESPACE: '/server'
    volumes:
      - ./dspace-ui/config.yml:/app/config/config.yml:ro
      - angular_dist:/app/dist
    depends_on:
      - dspace
    networks:
      - dspacenet
    expose:
      - "4000"
    restart: unless-stopped

  # ── 5. NGINX (PROXY INVERSO + SSL) ─────────────────────────────────────────
  # CRÍTICO: proxy_pass al backend DEBE terminar en /server.
  #   Sin esa ruta exacta el backend devuelve 404 → nginx lo convierte en 502.
  nginx:
    image: nginx:1.25-alpine
    container_name: dspace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dspace
      - dspace-ui
    networks:
      - dspacenet
    restart: unless-stopped
