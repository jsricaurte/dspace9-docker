###############################################################################
# DSpace 9 — Docker Compose VALIDADO EN PRODUCCIÓN
#
# Servidor probado: Ubuntu 24.04 LTS, 8 cores, 8 GB RAM
# Versiones:        DSpace 9.3-SNAPSHOT · PostgreSQL 16 · NGINX 1.25
#
# ⚠ ANTES DE USAR:
#   1. cp .env.example .env
#   2. Edita .env con tu IP/dominio y contraseña
#   3. chmod +x setup.sh limpiar.sh
#   4. ./limpiar.sh   ← solo si quieres empezar desde cero
#   5. ./setup.sh
#
# ERRORES CRÍTICOS RESUELTOS (ver docs/ERRORES.md para detalles):
#   ✓ Spring Boot muere silenciosamente → LOGGING_CONFIG obligatorio
#   ✓ Error 500 "Service unavailable" → ssrBaseUrl en config.yml
#   ✓ Error 502 Bad Gateway permanente → proxy_pass con /server al final
#   ✓ docker compose down no baja todo → sin restart en todos los servicios
#   ✓ Solr falla con "cp: cannot stat" → entrypoint sin comandos cp
#   ✓ nginx no confía en el proxy → subnet y proxies.trusted.ipranges alineados
###############################################################################

networks:
  dspacenet:
    driver: bridge
    ipam:
      config:
        # Subnet fija OBLIGATORIA — debe coincidir con proxies.trusted.ipranges
        # del servicio dspace. Si cambias esto, cambia también ese valor.
        - subnet: 172.23.0.0/24

volumes:
  pgdata:       # Datos PostgreSQL  ← NUNCA borrar en producción
  solrdata:     # Índices Solr       ← NUNCA borrar en producción
  assetstore:   # Archivos subidos   ← NUNCA borrar en producción

services:

  # ── 1. POSTGRESQL 16 ───────────────────────────────────────────────────────
  dspacedb:
    image: postgres:16-alpine
    container_name: dspacedb
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-dspace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dspacenet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dspace} -d ${POSTGRES_DB:-dspace}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Sin restart: los contenedores deben bajar con docker compose down sin resistencia
    restart: "no"

  # ── 2. APACHE SOLR ─────────────────────────────────────────────────────────
  # LECCIÓN: No usar el entrypoint del repo oficial de GitHub.
  # Ese compose es para desarrollo con código fuente local.
  # Las imágenes de Docker Hub ya incluyen los configsets — solo precreate-core.
  dspacesolr:
    image: dspace/dspace-solr:dspace-9_x
    container_name: dspacesolr
    user: root
    working_dir: /var/solr/data
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        init-var-solr
        precreate-core authority  /opt/solr/server/solr/configsets/authority
        precreate-core oai        /opt/solr/server/solr/configsets/oai
        precreate-core search     /opt/solr/server/solr/configsets/search
        precreate-core statistics /opt/solr/server/solr/configsets/statistics
        chown -R solr:solr /var/solr
        runuser -u solr -- solr-foreground
    volumes:
      - solrdata:/var/solr/data
    networks:
      - dspacenet
    restart: "no"

  # ── 3. DSPACE BACKEND (REST API) ───────────────────────────────────────────
  # LECCIÓN 1 (CRÍTICA): LOGGING_CONFIG es OBLIGATORIO.
  #   Sin esta variable, Log4j2 entra en un bucle recursivo con Spring Boot y
  #   mata el proceso silenciosamente — solo aparece el banner ASCII en los logs.
  #
  # LECCIÓN 2: proxies.trusted.ipranges DEBE coincidir con la subnet de la red.
  #   Si DSpace no confía en el proxy de nginx, las IPs de cliente quedan mal
  #   registradas y algunas operaciones fallan.
  #
  # LECCIÓN 3: dspace__P__server__P__url y dspace__P__ui__P__url deben ser
  #   las URLs públicas reales (con HTTPS). DSpace las usa en metadatos OAI-PMH
  #   y en cabeceras de respuesta.
  dspace:
    image: dspace/dspace:dspace-9_x
    container_name: dspace
    environment:
      dspace__P__dir:             /dspace
      dspace__P__name:            ${DSPACE_NAME:-Repositorio Institucional}
      dspace__P__server__P__url:  https://${DSPACE_HOST}/server
      dspace__P__ui__P__url:      https://${DSPACE_HOST}
      db__P__url:        jdbc:postgresql://dspacedb:5432/${POSTGRES_DB:-dspace}
      db__P__username:   ${POSTGRES_USER:-dspace}
      db__P__password:   ${POSTGRES_PASSWORD}
      solr__P__server:   http://dspacesolr:8983/solr
      proxies__P__trusted__P__ipranges: '172.23.0'
      # OBLIGATORIO: evita el bucle recursivo Log4j2 + Spring Boot 3.5.x
      LOGGING_CONFIG: /dspace/config/log4j2-container.xml
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        echo "Esperando PostgreSQL en dspacedb:5432..."
        while ! (echo > /dev/tcp/dspacedb/5432) 2>/dev/null; do
          sleep 3
        done
        echo "PostgreSQL listo."
        echo "Esperando Solr en dspacesolr:8983..."
        while ! (echo > /dev/tcp/dspacesolr/8983) 2>/dev/null; do
          sleep 3
        done
        echo "Solr listo. Ejecutando migración de base de datos..."
        /dspace/bin/dspace database migrate
        echo "Migración completa. Iniciando REST API..."
        java -jar /dspace/webapps/server-boot.jar --dspace.dir=/dspace
    volumes:
      - assetstore:/dspace/assetstore
    depends_on:
      dspacedb:
        condition: service_healthy
      dspacesolr:
        condition: service_started
    networks:
      - dspacenet
    expose:
      - "8080"
    restart: "no"

  # ── 4. DSPACE ANGULAR UI (FRONTEND) ────────────────────────────────────────
  # LECCIÓN CRÍTICA — SSR (Server Side Rendering):
  #   Angular Universal renderiza páginas en el servidor Node ANTES de
  #   enviarlas al navegador. Durante ese proceso, Node intenta contactar
  #   el backend usando la URL pública (DSPACE_HOST), pero desde DENTRO del
  #   contenedor esa IP/dominio NO es accesible.
  #
  #   Solución: config.yml con ssrBaseUrl apuntando al nombre interno Docker.
  #     - El navegador del usuario usa:  DSPACE_HOST (IP/dominio público)
  #     - El SSR interno (Node) usa:     http://dspace:8080/server
  #     - ssr.replaceRestUrl garantiza que las URLs internas no lleguen al browser
  #
  #   Sin ssrBaseUrl → error 500 "Service unavailable" permanente.
  #   El setup.sh genera dspace-ui/config.yml con la IP correcta de tu .env.
  dspace-ui:
    image: dspace/dspace-angular:dspace-9_x
    container_name: dspace-ui
    environment:
      DSPACE_UI_SSL:         'false'
      DSPACE_UI_HOST:        '0.0.0.0'
      DSPACE_UI_PORT:        '4000'
      DSPACE_REST_SSL:       'false'
      DSPACE_REST_HOST:      ${DSPACE_HOST}
      DSPACE_REST_PORT:      '443'
      DSPACE_REST_NAMESPACE: '/server'
    volumes:
      # config.yml generado por setup.sh con la IP real del .env
      # Nunca editar este archivo a mano — usar el .env y re-ejecutar setup.sh
      - ./dspace-ui/config.yml:/app/config/config.yml:ro
    depends_on:
      - dspace
    networks:
      - dspacenet
    expose:
      - "4000"
    restart: "no"

  # ── 5. NGINX (PROXY INVERSO + SSL) ─────────────────────────────────────────
  # LECCIÓN: proxy_pass al backend DEBE terminar en /server.
  #   Sin esa ruta, el backend responde 404 que nginx convierte en 502.
  nginx:
    image: nginx:1.25-alpine
    container_name: dspace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dspace
      - dspace-ui
    networks:
      - dspacenet
    restart: "no"
